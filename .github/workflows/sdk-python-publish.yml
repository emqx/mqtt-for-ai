name: Publish Python SDK

on:
  workflow_dispatch:
    inputs:
      repository:
        description: 'Target repository'
        required: true
        type: choice
        options:
          - testpypi
          - pypi
        default: testpypi

defaults:
  run:
    working-directory: a2a-over-mqtt/sdk/python

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11', '3.12', '3.13']
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}
      - name: Run tests
        run: uv run pytest tests/ -v

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
      - run: uv python install 3.13
      - run: uv run python -m build
      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: a2a-over-mqtt/sdk/python/dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: ${{ inputs.repository }}
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: ${{ inputs.repository == 'testpypi' && 'https://test.pypi.org/legacy/' || 'https://upload.pypi.org/legacy/' }}
